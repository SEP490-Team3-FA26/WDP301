name: CI/CD — Build → ECR → Deploy EC2

# ──────────────────────────────────────────────────────────────
# Required GitHub repo secrets:
#   AWS_ACCESS_KEY_ID       IAM user/key allowed to push to ECR
#   AWS_SECRET_ACCESS_KEY
#   EC2_HOST                Public IP / DNS of the EC2 instance
#   EC2_SSH_KEY             Private key (.pem contents) for the EC2 key pair
# Required GitHub repo variables (Settings → Variables):
#   AWS_REGION              e.g. ap-southeast-1   (defaults below if unset)
#   ECR_REGISTRY            e.g. <acct>.dkr.ecr.ap-southeast-1.amazonaws.com
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]   # chỉ build & deploy khi push/merge vào main
  workflow_dispatch:    # cho phép chạy tay từ tab Actions khi cần

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  BACKEND_REPO: wdp301-backend
  # Frontend deploy bởi Vercel (không build/push ECR ở đây).

jobs:
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Backend lint & test
        working-directory: backend
        run: |
          npm ci --legacy-peer-deps
          npm run lint || true
          npm test -- --passWithNoTests || true

  # ──────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ship the compose file to the instance
      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/wdp301

      - name: Pull & restart on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/wdp301

            # Persist the new tag into .env (so manual `up` reuses it too)
            grep -q '^IMAGE_TAG=' .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

            ecr-login
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
