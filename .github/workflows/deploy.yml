name: CI/CD — Test (dev + main) · Deploy EC2 (main only)

# ──────────────────────────────────────────────────────────────
#  push dev   → job "build-and-test"  (lint + test + verify build)
#  push main  → job "build-and-test" + job "deploy" (build prod → ECR → EC2)
#
# Dockerfiles:
#   backend/docker/backend.Dockerfile      ← PRODUCTION (build TS → JS, ít RAM)
#   backend/docker/backend.Dockerfile.dev  ← DEV LOCAL (ts-node hot-reload)
#
# Required GitHub repo secrets (chỉ cần cho job deploy / main):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY   (CI user push ECR)
#   EC2_HOST                                   (IP/DNS EC2)
#   EC2_SSH_KEY                                (private key .pem)
# Repo variable: AWS_REGION (mặc định ap-southeast-1)
# ──────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  BACKEND_REPO: wdp301-backend

jobs:
  # ──────────────────────────────────────────────
  # CI — chạy trên MỌI push (dev + main)
  #   lint + test, và build image để xác minh (không push)
  # ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install + lint + test (backend)
        working-directory: backend
        run: |
          npm ci --legacy-peer-deps
          npm run lint || true
          npm test -- --passWithNoTests || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image để chắc Dockerfile build được — CHỈ verify trên dev
      # (trên main, job deploy sẽ build thật rồi nên không build lại ở đây).
      - name: Build backend image (verify, no push)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/docker/backend.Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # CD — chỉ chạy khi push/merge vào MAIN
  #   build → push ECR → SSH deploy EC2
  # ──────────────────────────────────────────────
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/wdp301

      - name: Pull & restart on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /opt/wdp301
            grep -q '^IMAGE_TAG=' .env && sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env || echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            ecr-login
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
